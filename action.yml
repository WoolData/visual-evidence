name: Visual Evidence
description: Publish durable, exact-revision images or before/after screenshots to a GitHub pull request without a browser or file picker.
author: Wool Data Inc.
branding:
  icon: image
  color: blue
inputs:
  evidence-root:
    description: Directory containing before/manifest.json, after/manifest.json, and capture images.
    required: false
  image-root:
    description: Directory of PNG images to publish without before/after comparison semantics.
    required: false
  images:
    description: Newline-delimited PNG paths to publish individually.
    required: false
  summary:
    description: Short reviewer-facing explanation of the visible change.
    required: true
  pull-request-number:
    description: Pull request number. Defaults to the current pull_request event.
    required: false
    default: ${{ github.event.pull_request.number }}
  repository:
    description: GitHub repository in owner/name form.
    required: false
    default: ${{ github.repository }}
  github-token:
    description: GITHUB_TOKEN or a user token with repository contents and pull-request comment write access.
    required: true
  comment-author-login:
    description: Login used to find this publisher's existing comment. Override for a custom GitHub App token.
    required: false
  assets-branch:
    description: Protected append-only branch used to retain evidence commits.
    required: false
    default: visual-evidence-assets
  publish-status:
    description: Publish visual-evidence/published commit status. Requires statuses write permission.
    required: false
    default: "false"
  use-source:
    description: Compile from the checked-out Action source for contributor testing. Consumers should keep this false.
    required: false
    default: "false"
outputs:
  asset-commit:
    description: Immutable commit containing the published images.
    value: ${{ steps.publish.outputs.asset-commit }}
  capture-count:
    description: Number of images or before/after capture pairs published.
    value: ${{ steps.publish.outputs.capture-count }}
  mode:
    description: Publication mode, either comparison or images.
    value: ${{ steps.publish.outputs.mode }}
runs:
  using: composite
  steps:
    - name: Set up .NET
      uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
      with:
        dotnet-version: 10.0.x
    - name: Validate and publish visual evidence
      id: publish
      shell: pwsh
      env:
        VISUAL_EVIDENCE_ROOT: ${{ inputs.evidence-root }}
        VISUAL_EVIDENCE_IMAGE_ROOT: ${{ inputs.image-root }}
        VISUAL_EVIDENCE_IMAGES: ${{ inputs.images }}
        VISUAL_EVIDENCE_SUMMARY: ${{ inputs.summary }}
        VISUAL_EVIDENCE_PR: ${{ inputs.pull-request-number }}
        VISUAL_EVIDENCE_REPOSITORY: ${{ inputs.repository }}
        VISUAL_EVIDENCE_ASSETS_BRANCH: ${{ inputs.assets-branch }}
        VISUAL_EVIDENCE_COMMENT_AUTHOR: ${{ inputs.comment-author-login }}
        VISUAL_EVIDENCE_PUBLISH_STATUS: ${{ inputs.publish-status }}
        VISUAL_EVIDENCE_USE_SOURCE: ${{ inputs.use-source }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        $commentAuthorArgs = if ([string]::IsNullOrWhiteSpace($env:VISUAL_EVIDENCE_COMMENT_AUTHOR)) {
          @()
        } else {
          @("--comment-author-login", $env:VISUAL_EVIDENCE_COMMENT_AUTHOR)
        }

        $inputModes = @(
          -not [string]::IsNullOrWhiteSpace($env:VISUAL_EVIDENCE_ROOT)
          -not [string]::IsNullOrWhiteSpace($env:VISUAL_EVIDENCE_IMAGE_ROOT)
          -not [string]::IsNullOrWhiteSpace($env:VISUAL_EVIDENCE_IMAGES)
        ) | Where-Object { $_ }
        if ($inputModes.Count -ne 1) {
          throw "Provide exactly one of evidence-root, image-root, or images."
        }
        $inputArgs = if (-not [string]::IsNullOrWhiteSpace($env:VISUAL_EVIDENCE_ROOT)) {
          @("--evidence-root", $env:VISUAL_EVIDENCE_ROOT)
        } elseif (-not [string]::IsNullOrWhiteSpace($env:VISUAL_EVIDENCE_IMAGE_ROOT)) {
          @("--image-root", $env:VISUAL_EVIDENCE_IMAGE_ROOT)
        } else {
          @($env:VISUAL_EVIDENCE_IMAGES -split "`r?`n" | Where-Object { -not [string]::IsNullOrWhiteSpace($_) } | ForEach-Object { "--image"; $_ })
        }

        $result = & (Join-Path $env:GITHUB_ACTION_PATH "scripts/Invoke-VisualEvidenceTool.ps1") `
          publish `
          --repository $env:VISUAL_EVIDENCE_REPOSITORY `
          --change-number $env:VISUAL_EVIDENCE_PR `
          @inputArgs `
          --summary $env:VISUAL_EVIDENCE_SUMMARY `
          --assets-branch $env:VISUAL_EVIDENCE_ASSETS_BRANCH `
          @commentAuthorArgs `
          --publish-status $env:VISUAL_EVIDENCE_PUBLISH_STATUS
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        $published = $result | ConvertFrom-Json
        "asset-commit=$($published.assetCommit)" >> $env:GITHUB_OUTPUT
        "capture-count=$($published.captures)" >> $env:GITHUB_OUTPUT
        "mode=$($published.mode)" >> $env:GITHUB_OUTPUT
