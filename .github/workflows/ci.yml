name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: "**/packages.lock.json"
      - run: dotnet restore VisualEvidence.slnx --locked-mode
      - run: dotnet format VisualEvidence.slnx --verify-no-changes --no-restore
      - run: dotnet build VisualEvidence.slnx --configuration Release --no-restore
      - run: dotnet test VisualEvidence.slnx --configuration Release --no-build
      - run: dotnet run --project src/WoolData.VisualEvidence.Cli/WoolData.VisualEvidence.Cli.csproj --configuration Release --no-build -- --help

  audit:
    name: dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 10.0.x
      - run: dotnet list VisualEvidence.slnx package --vulnerable --include-transitive
      - run: dotnet list VisualEvidence.slnx package --deprecated --include-transitive

  pack:
    name: pack (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 10.0.x
      - name: Build slim package
        shell: pwsh
        run: ./scripts/New-VisualEvidenceToolPackage.ps1 -OutputDirectory artifacts/package
      - name: Install and execute package
        shell: pwsh
        run: |
          dotnet tool install WoolData.VisualEvidence.Tool --tool-path artifacts/tool --add-source artifacts/package --ignore-failed-sources
          if ($LASTEXITCODE -ne 0) { throw 'Tool package installation failed.' }
          $tool = Join-Path artifacts/tool $(if ($IsWindows) { 'visual-evidence.exe' } else { 'visual-evidence' })
          $description = & $tool describe --json | ConvertFrom-Json
          if ($LASTEXITCODE -ne 0 -or $description.protocolVersion -ne 1) { throw 'Installed tool smoke test failed.' }

  native-aot:
    name: native AOT (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            executable: visual-evidence.exe
          - os: ubuntu-latest
            rid: linux-x64
            executable: visual-evidence
          - os: macos-latest
            rid: osx-arm64
            executable: visual-evidence
          - os: macos-15-intel
            rid: osx-x64
            executable: visual-evidence
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 10.0.x
      - name: Publish NativeAOT executable
        shell: pwsh
        run: >-
          dotnet publish src/WoolData.VisualEvidence.Cli/WoolData.VisualEvidence.Cli.csproj
          --configuration Release --runtime ${{ matrix.rid }} --self-contained true
          -p:PublishAot=true -p:PublishTrimmed=true --output artifacts/native
      - name: Run NativeAOT protocol smoke test
        shell: pwsh
        run: |
          $tool = Join-Path "artifacts/native" "${{ matrix.executable }}"
          $description = & $tool describe --json | ConvertFrom-Json
          if ($LASTEXITCODE -ne 0 -or $description.protocolVersion -ne 1 -or -not $description.captureIsExternal) {
            throw "NativeAOT protocol smoke test failed."
          }
          [IO.File]::WriteAllBytes("artifacts/native-smoke.png", [Convert]::FromBase64String((Get-Content examples/native-smoke.png.base64 -Raw).Trim()))
          $validation = & $tool validate --image artifacts/native-smoke.png --json | ConvertFrom-Json
          if ($LASTEXITCODE -ne 0 -or -not $validation.ok -or $validation.captures -ne 1) {
            throw "NativeAOT PNG validation smoke test failed."
          }
      - name: Add distribution notices and remove debug symbols
        shell: pwsh
        run: ./scripts/Prepare-NativeDistribution.ps1 -PublishDirectory artifacts/native
      - name: Run packaged Action bootstrap smoke test
        shell: pwsh
        env:
          VISUAL_EVIDENCE_USE_SOURCE: "false"
          VISUAL_EVIDENCE_DISTRIBUTION_ROOT: artifacts/distribution
        run: |
          $archive = "visual-evidence-v0.2.2-${{ matrix.rid }}.zip"
          New-Item -ItemType Directory -Path artifacts/distribution -Force | Out-Null
          Compress-Archive -Path artifacts/native/* -DestinationPath "artifacts/distribution/$archive"
          $hash = (Get-FileHash "artifacts/distribution/$archive" -Algorithm SHA256).Hash.ToLowerInvariant()
          Set-Content "artifacts/distribution/$archive.sha256" "$hash  $archive" -NoNewline
          $description = & ./scripts/Invoke-VisualEvidenceTool.ps1 describe --json | ConvertFrom-Json
          if ($LASTEXITCODE -ne 0 -or $description.protocolVersion -ne 1) {
            throw "Packaged Action bootstrap smoke test failed."
          }
